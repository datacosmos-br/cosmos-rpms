# layout matches the 6.12 kernel, unlike the current 7.0 spec. build-rpm.sh SPEC_REF default.
specSource: elrepo/kernel@b2af198041d1b7c74e7669dc4ffc03ac1f3a946c:kernel-ml/el8/kernel-ml-6.12.spec
versions:
  - "6.12.92"
arches:
  - x86_64
  - aarch64
